<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="initial-scale=1, width=device-width">

        <!-- Bootstrap 5.3 CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        
        <link href="/static/favicon.ico" rel="icon">
        <link href="/static/styles.css" rel="stylesheet">

        <title>Cooksy: {% block title %}{% endblock %}</title>
    </head>
    <body>
        <!-- Switched navbar to be theme-aware -->
        <nav class="navbar navbar-expand-md border-bottom mb-4">
            <div class="container-fluid">
                <a class="navbar-brand fw-bold" href="/">Cooksy 🍴</a>
                <button aria-controls="navbar" aria-expanded="false" aria-label="Toggle navigation" class="navbar-toggler" data-bs-target="#navbar" data-bs-toggle="collapse" type="button">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbar">
                    {% if session["user_id"] %}
                        <ul class="navbar-nav me-auto mt-2">
                            <li class="nav-item"><a class="nav-link" href="/">Search</a></li>
                            <li class="nav-item"><a class="nav-link" href="/favorites">Favorites</a></li>
                        </ul>
                        <ul class="navbar-nav ms-auto mt-2 align-items-center">
                            <!-- THE DARK MODE BUTTON -->
                            <li class="nav-item me-3">
                                <button id="theme-toggle" class="btn btn-sm btn-outline-secondary rounded-pill px-3">
                                    🌑 Dark Mode
                                </button>
                            </li>
                            <li class="nav-item"><a class="nav-link text-danger" href="/logout">Log Out</a></li>
                        </ul>
                    {% else %}
                        <ul class="navbar-nav ms-auto mt-2 align-items-center">
                            <!-- THE DARK MODE BUTTON (For logged-out users) -->
                            <li class="nav-item me-3">
                                <button id="theme-toggle" class="btn btn-sm btn-outline-secondary rounded-pill px-3">
                                    🌑 Dark Mode
                                </button>
                            </li>
                            <li class="nav-item"><a class="nav-link" href="/register">Register</a></li>
                            <li class="nav-item"><a class="nav-link" href="/login">Log In</a></li>
                        </ul>
                    {% endif %}
                </div>
            </div>
        </nav>

        {% if get_flashed_messages() %}
            <header>
                <div class="alert alert-success mx-auto w-50 mb-4 text-center shadow-sm" role="alert">
                    {{ get_flashed_messages() | join(" ") }}
                </div>
            </header>
        {% endif %}

        <main class="container py-4 text-center">
            {% block main %}{% endblock %}
        </main>

        <!-- THE DARK MODE JAVASCRIPT LOGIC -->
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const htmlElement = document.documentElement;
                const themeToggleBtn = document.getElementById('theme-toggle');
                
                // 1. Check browser's memory to see if they already picked a theme
                const savedTheme = localStorage.getItem('pantryTheme') || 'light';
                
                // 2. Apply that theme immediately on page load
                htmlElement.setAttribute('data-bs-theme', savedTheme);
                updateButton(savedTheme);

                // 3. Listen for clicks on the toggle button
                themeToggleBtn.addEventListener('click', () => {
                    // Figure out what the *new* theme should be
                    const currentTheme = htmlElement.getAttribute('data-bs-theme');
                    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                    
                    // Apply it, save it to memory, and update the button text
                    htmlElement.setAttribute('data-bs-theme', newTheme);
                    localStorage.setItem('pantryTheme', newTheme);
                    updateButton(newTheme);
                });

                // Helper function to change the button text/icon
                function updateButton(theme) {
                    if (theme === 'dark') {
                        themeToggleBtn.innerHTML = '⚪ Light Mode';
                        themeToggleBtn.classList.replace('btn-outline-secondary', 'btn-outline-light');
                    } else {
                        themeToggleBtn.innerHTML = '🌑 Dark Mode';
                        themeToggleBtn.classList.replace('btn-outline-light', 'btn-outline-secondary');
                    }
                }
            });
        </script>
    </body>
</html>
